<svg width="640" height="80" viewBox="0 80 640 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&amp;display=swap');
      .brand { font-family: 'DM Serif Display', Georgia, serif; font-size: 32px; letter-spacing: -0.5px; }

      @keyframes sail-across {
        0%   { transform: translateX(-120px); }
        100% { transform: translateX(380px); }
      }
      @keyframes word-reveal {
        0%,10% { clip-path: inset(0 100% 0 0); opacity: 0; }
        14%    { opacity: 1; }
        25%    { clip-path: inset(0 75% 0 0); }
        45%    { clip-path: inset(0 45% 0 0); }
        65%    { clip-path: inset(0 18% 0 0); }
        78%    { clip-path: inset(0 0% 0 0); opacity: 1; }
        100%   { clip-path: inset(0 0% 0 0); opacity: 1; }
      }
      @keyframes waterline {
        0%,100% { d: path("M100 152 Q160 149 220 152 Q280 155 340 151 Q400 148 460 151 Q500 153 530 151"); }
        50%     { d: path("M100 151 Q160 154 220 150 Q280 147 340 152 Q400 155 460 150 Q500 148 530 152"); }
      }

      .boat     { animation: sail-across 3s cubic-bezier(0.4,0,0.6,1) 1 forwards; }
      .wordmark { animation: word-reveal 3s ease-in-out 1 forwards; }
      .water    { animation: waterline 2.5s ease-in-out infinite; fill: none; stroke: #F0F4F8; stroke-width: 1; stroke-linecap: round; opacity: 0.3; }
    </style>
  </defs>

  <!-- waterline -->
  <path class="water" d="M100 152 Q160 149 220 152 Q280 155 340 151 Q400 148 460 151 Q500 153 530 151"/>

  <!-- wordmark -->
  <g class="wordmark">
    <text class="brand" x="118" y="146">
      <tspan fill="#F0F4F8">Carden</tspan><tspan fill="#F0F4F8" opacity="0.45">Studio</tspan>
    </text>
  </g>

  <!-- boat — mask paths use transparent so bg shows through -->
  <g class="boat">
    <path d="M-16 148 Q-6 155 8 157 Q22 158 28 155 L31 148 Z" fill="transparent"/>
    <path d="M-16 148 Q-6 155 8 157 Q22 158 28 155 L31 148 Z" fill="#F0F4F8" opacity="0.9"/>
    <line x1="10" y1="148" x2="10" y2="116" stroke="#F0F4F8" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M10 118 L10 146 L32 140 Z" fill="transparent"/>
    <path d="M10 118 L10 146 L32 140 Z" fill="#F0F4F8" opacity="0.85"/>
    <path d="M10 122 L10 145 L-8 143 Z" fill="transparent"/>
    <path d="M10 122 L10 145 L-8 143 Z" fill="#F0F4F8" opacity="0.35"/>
    <path d="M-19 151 Q-25 149 -32 151" fill="none" stroke="#F0F4F8" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  </g>

</svg>
